# Logrotate config for NanoClaw logs
# Install: cp scripts/nanoclaw-logrotate.conf /etc/logrotate.d/nanoclaw
# Or for user-level: add to crontab with `logrotate --state ~/.local/state/logrotate.status`

{{PROJECT_ROOT}}/logs/nanoclaw.json.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}

{{PROJECT_ROOT}}/logs/nanoclaw.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}

{{PROJECT_ROOT}}/logs/nanoclaw.error.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
