name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy:
    needs: test
    runs-on: self-hosted
    timeout-minutes: 15
    # Only run one deploy at a time — queue newer deploys behind the current one
    concurrency:
      group: deploy
      cancel-in-progress: false
    env:
      # systemctl --user needs the D-Bus session bus
      XDG_RUNTIME_DIR: /run/user/${{ vars.DEPLOY_UID || '1000' }}

    steps:
      - name: Pull latest changes
        run: |
          cd "$PROJECT_ROOT"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin main
          git reset --hard origin/main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: cd "$PROJECT_ROOT" && npm ci --prefer-offline

      - name: Build TypeScript
        run: cd "$PROJECT_ROOT" && npm run build

      - name: Rebuild container image
        run: cd "$PROJECT_ROOT" && docker build -t nanoclaw-agent:latest ./container

      - name: Restart NanoClaw
        run: |
          systemctl --user restart nanoclaw
          echo "Restarted via systemctl --user"

      - name: Verify service is running
        run: |
          sleep 5
          systemctl --user is-active nanoclaw
          echo "nanoclaw is active"
