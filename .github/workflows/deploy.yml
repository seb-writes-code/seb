name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy:
    needs: test
    runs-on: self-hosted
    timeout-minutes: 15
    # Only run one deploy at a time — queue newer deploys behind the current one
    concurrency:
      group: deploy
      cancel-in-progress: false
    env:
      # systemctl --user needs the D-Bus session bus
      XDG_RUNTIME_DIR: /run/user/${{ vars.DEPLOY_UID || '1000' }}

    steps:
      - name: Pull latest changes
        run: |
          cd "$PROJECT_ROOT"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin main
          git reset --hard origin/main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: cd "$PROJECT_ROOT" && npm ci --prefer-offline

      - name: Build TypeScript
        run: cd "$PROJECT_ROOT" && npm run build

      - name: Rebuild container image
        run: cd "$PROJECT_ROOT" && docker build -t nanoclaw-agent:latest ./container

      - name: Restart NanoClaw
        run: |
          systemctl --user restart nanoclaw
          echo "Restarted via systemctl --user"

      - name: Verify service is running
        run: |
          sleep 5
          systemctl --user is-active nanoclaw
          echo "nanoclaw is active"

      - name: Post-deploy summary
        if: github.event_name == 'push'
        continue-on-error: true
        run: |
          set +e
          cd "$PROJECT_ROOT"

          # Build deploy summary
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_MSG=$(git log -1 --format="%s" "${{ github.sha }}")
          PR_NUMBER=$(echo "$COMMIT_MSG" | grep -oP '#\K\d+' | head -1 || true)

          SUMMARY="Deploy complete: ${SHORT_SHA} ${COMMIT_MSG}"
          if [ -n "$PR_NUMBER" ]; then
            SUMMARY="${SUMMARY}
          https://github.com/${{ github.repository }}/pull/${PR_NUMBER}"
          fi

          # Read bot token from .env and main group chat ID from the database
          BOT_TOKEN=$(grep '^TELEGRAM_BOT_TOKEN=' .env | cut -d= -f2- || true)
          MAIN_JID=$(sqlite3 data/nanoclaw.db "SELECT jid FROM registered_groups WHERE is_main = 1 LIMIT 1" 2>/dev/null || true)
          # Extract numeric Telegram chat ID from JID (format: tg:-1001234567890)
          CHAT_ID=$(echo "$MAIN_JID" | sed -n 's/^tg://p')

          if [ -n "$BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
            curl -sf "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="$SUMMARY" \
              -d disable_web_page_preview=true \
              > /dev/null
            echo "Deploy summary sent to Telegram"
          else
            echo "Telegram not configured or no main group, skipping notification"
            echo "BOT_TOKEN set: $([ -n "$BOT_TOKEN" ] && echo yes || echo no)"
            echo "MAIN_JID: $MAIN_JID"
            echo "CHAT_ID: $CHAT_ID"
          fi
