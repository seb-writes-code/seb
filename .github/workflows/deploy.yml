name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy:
    needs: test
    runs-on: self-hosted
    timeout-minutes: 15
    # Only run one deploy at a time — queue newer deploys behind the current one
    concurrency:
      group: deploy
      cancel-in-progress: false
    env:
      # systemctl --user needs the D-Bus session bus
      XDG_RUNTIME_DIR: /run/user/${{ vars.DEPLOY_UID || '1000' }}

    steps:
      - name: Pull latest changes
        run: |
          cd "$PROJECT_ROOT"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git pull --ff-only origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: cd "$PROJECT_ROOT" && npm ci --prefer-offline

      - name: Build TypeScript
        run: cd "$PROJECT_ROOT" && npm run build

      - name: Rebuild container image (if changed)
        run: |
          cd "$PROJECT_ROOT"
          # Check if container-related files changed in this push
          CONTAINER_CHANGED=$(git diff --name-only HEAD~1 HEAD -- container/ 2>/dev/null || echo "container/")
          if [ -n "$CONTAINER_CHANGED" ]; then
            echo "Container files changed, rebuilding image..."
            docker build -t nanoclaw-agent:latest ./container
          else
            echo "No container changes, skipping image rebuild"
          fi

      - name: Restart NanoClaw
        run: |
          systemctl --user restart nanoclaw
          echo "Restarted via systemctl --user"

      - name: Verify service is running
        run: |
          sleep 5
          systemctl --user is-active nanoclaw
          echo "nanoclaw is active"
